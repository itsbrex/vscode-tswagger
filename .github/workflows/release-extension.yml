name: Release Extension

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'packages/**'
      - '.changeset/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      publish_existing_release:
        description: 'Build and publish the current package.json version even if Release Please did not create a new release'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release_pr:
    name: Create Or Update Extension Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: release_pr
    if: ${{ needs.release_pr.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.publish_existing_release) }}
    outputs:
      package_name: ${{ steps.package_info.outputs.package_name }}
      package_version: ${{ steps.package_info.outputs.package_version }}
      release_tag: ${{ steps.package_info.outputs.release_tag }}
      is_prerelease: ${{ steps.package_info.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Environment
        id: package_info
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name + '-' + require('./package.json').version")
          TAG_NAME="extension-v${PACKAGE_VERSION}"
          node ./scripts/release/verify-tag.js extension "$TAG_NAME"
          IS_PRERELEASE="false"
          if [[ "$TAG_NAME" == extension-v*.*.*-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG_NAME" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          npm install pnpm@9 -g
          pnpm install --no-frozen-lockfile
      - name: Package Extension
        run: PRE_RELEASE=${{ env.IS_PRERELEASE }} pnpm run package
      - name: Upload Extension Package
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: ./${{ env.PACKAGE_NAME }}.vsix
          if-no-files-found: error

  publish_vscode:
    name: Publish To VS Code Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Download Extension Package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: .
      - name: Install VSCE
        run: npm install -g @vscode/vsce
      - name: Publish Extension
        run: |
          if [[ "${{ needs.build.outputs.is_prerelease }}" == "true" ]]; then
            vsce publish --pre-release --no-dependencies --packagePath ./${{ needs.build.outputs.package_name }}.vsix --pat ${{ secrets.TSWAGGER_PERSONAL_ACCESS_TOKEN }}
          else
            vsce publish --no-dependencies --packagePath ./${{ needs.build.outputs.package_name }}.vsix --pat ${{ secrets.TSWAGGER_PERSONAL_ACCESS_TOKEN }}
          fi

  publish_openvsx:
    name: Publish To OpenVSX
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Download Extension Package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: .
      - name: Install OVSX
        run: npm install -g ovsx
      - name: Publish Extension
        run: ovsx publish ./${{ needs.build.outputs.package_name }}.vsix -p ${{ secrets.OPENVSX_PAT }}

  release_and_notify:
    name: Create Release And Notify
    runs-on: ubuntu-latest
    needs:
      - build
      - publish_vscode
      - publish_openvsx
    if: ${{ always() && needs.build.result == 'success' && (needs.publish_vscode.result == 'success' || needs.publish_openvsx.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Download Extension Package
        uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: .
      - name: Generate Changelog
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ needs.build.outputs.package_version }}
          path: ./CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: TSwagger Extension v${{ needs.build.outputs.package_version }}
          body: ${{ steps.changelog.outputs.changes }}
          draft: false
          prerelease: ${{ needs.build.outputs.is_prerelease }}
          files: ./${{ needs.build.outputs.package_name }}.vsix
      - name: Generate Dingtalk Text
        id: dingtalk_text
        env:
          RELEASE_KIND: extension
          PACKAGE_VERSION: ${{ needs.build.outputs.package_version }}
          CHANGELOG_CHANGES: ${{ steps.changelog.outputs.changes }}
          VSCODE_PUBLISH_STATUS: ${{ needs.publish_vscode.result }}
          OPENVSX_PUBLISH_STATUS: ${{ needs.publish_openvsx.result }}
        run: printf 'text=%s\n' "$(node ./scripts/generate-dingtalk-text.js)" >> "$GITHUB_OUTPUT"
      - name: Dingtalk Notify
        uses: Orchardxyz/dingtalk-bot-message@v1
        with:
          dingToken: ${{ secrets.DING_TALK_ACCESS_TOKEN}}
          body: |
            {
                "msgtype": "markdown",
                "markdown": {
                    "title":"TSwagger Extension Release",
                    "text": ${{ steps.dingtalk_text.outputs.text }}
                },
                "at": {
                    "isAtAll": false
                }
            }
